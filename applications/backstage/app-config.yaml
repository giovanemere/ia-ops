app:
  title: IA-OPS Developer Portal
  baseUrl: http://localhost:3002
organization:
  name: IA-OPS
backend:
  auth:
    keys:
    - secret: ${BACKEND_SECRET:-your-secret-key-here}
    externalAccess:
    - type: static
      options:
        token: ${BACKEND_SECRET}
        subject: backstage-server
  baseUrl: http://localhost:7007
  listen:
    port: 7007
  csp:
    connect-src:
    - '''self'''
    - 'http:'
    - 'https:'
  cors:
    origin: http://localhost:3002
    methods:
    - GET
    - HEAD
    - PATCH
    - POST
    - PUT
    - DELETE
    credentials: true
  database:
    client: pg
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
      database: ${POSTGRES_DB}
      ssl: false
auth:
  environment: development
  session:
    secret: ${BACKEND_SECRET}
  providers:
    guest:
      dangerouslyAllowOutsideDevelopment: true
    github:
      development:
        clientId: ${AUTH_GITHUB_CLIENT_ID}
        clientSecret: ${AUTH_GITHUB_CLIENT_SECRET}
        callbackUrl: ${AUTH_GITHUB_CALLBACK_URL}
jenkins:
  instances:
  - name: weblogic-jenkins
    baseUrl: http://localhost:8091
    username: admin
    apiKey: admin123
proxy:
  endpoints:
    /jenkins-api:
      target: http://localhost:8091
      changeOrigin: true
      headers:
        Authorization: Basic YWRtaW46YWRtaW4xMjM=
    /nexus-api:
      target: http://localhost:8092
      changeOrigin: true
    /sonarqube-api:
      target: http://localhost:9000
      changeOrigin: true
integrations:
  github:
  - host: github.com
    token: ${GITHUB_TOKEN}
techdocs:
  builder: local
  generator:
    runIn: docker
    dockerImage: spotify/techdocs
    pullImage: true
  publisher:
    type: local
    local:
      publishDirectory: ./techdocs
  cache:
    ttl: 3600000
catalog:
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration
  rules:
  - allow:
    - Component
    - System
    - API
    - Resource
    - Location
    - Template
    - Domain
    - Group
    - User
  locations:
  - type: url
    target: https://github.com/giovanemere/poc-billpay-back/blob/trunk/catalog-info.yaml
    rules:
    - allow:
      - Component
      - API
  - type: url
    target: https://github.com/giovanemere/poc-billpay-front-a/blob/trunk/catalog-info.yaml
    rules:
    - allow:
      - Component
  - type: url
    target: https://github.com/giovanemere/poc-billpay-front-b/blob/trunk/catalog-info.yaml
    rules:
    - allow:
      - Component
  - type: url
    target: https://github.com/giovanemere/poc-billpay-front-feature-flags/blob/trunk/catalog-info.yaml
    rules:
    - allow:
      - Component
  - type: url
    target: https://github.com/giovanemere/poc-icbs/blob/trunk/catalog-info.yaml
    rules:
    - allow:
      - Component
      - API
  providers:
    github:
      giovanemere:
        organization: giovanemere
        catalogPath: /catalog-info.yaml
        filters:
          branch: trunk
          repository: .*
        schedule:
          frequency:
            minutes: 10
          timeout:
            minutes: 3
github-actions:
  proxyPath: /github-actions
  cache:
    ttl: 300000
  scheduler:
    frequency:
      minutes: 5
    timeout:
      minutes: 2
events:
  modules:
    catalog:
      enabled: true
    github:
      enabled: true
      webhookUrl: ${GITHUB_WEBHOOK_URL:-}
permission:
  enabled: true
  rules:
  - allow:
    - catalog.entity.read
  - allow:
    - catalog.entity.create
    resourceType: catalog-entity
  - allow:
    - catalog.entity.update
    resourceType: catalog-entity
  - allow:
    - catalog.entity.delete
    resourceType: catalog-entity
kubernetes:
  serviceLocatorMethod:
    type: multiTenant
  clusterLocatorMethods:
  - type: config
    clusters:
    - url: ${K8S_CLUSTER_URL:-http://localhost:8001}
      name: local-cluster
      authProvider: serviceAccount
      skipTLSVerify: true
      skipMetricsLookup: true
