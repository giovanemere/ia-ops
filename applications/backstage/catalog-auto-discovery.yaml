apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: poc-icbs
  title: ICBS Oracle WebLogic Platform
  description: Oracle WebLogic platform with Docker containerization
  annotations:
    github.com/project-slug: giovanemere/poc-icbs
    backstage.io/techdocs-ref: dir:.
    github.com/workflows: ci-cd.yml
    docker.com/image: poc-icbs/weblogic
spec:
  type: service
  lifecycle: production
  owner: infrastructure-team
  system: icbs-system
  providesApis:
    - icbs-api
  dependsOn:
