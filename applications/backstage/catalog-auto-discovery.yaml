---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: backstage-api
  title: Backstage API
  description: Backstage platform API for service catalog and developer portal
  annotations:
    github.com/project-slug: giovanemere/ia-ops
spec:
  type: openapi
  lifecycle: production
  owner: platform-team
  system: ia-ops-platform
  definition: |
    openapi: 3.0.0
    info:
      title: Backstage API
      version: 1.0.0
    paths:
      /api/catalog/entities:
        get:
          summary: Get catalog entities
          responses:
            '200':
              description: List of entities
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: billpay-api
  title: BillPay API
  description: REST API for bill payment processing
  annotations:
    github.com/project-slug: giovanemere/poc-billpay-back
spec:
  type: openapi
  lifecycle: production
  owner: backend-team
  system: billpay-system
  definition: |
    openapi: 3.0.0
    info:
      title: BillPay API
      version: 1.0.0
    paths:
      /api/bills:
        get:
          summary: Get bills
          responses:
            '200':
              description: List of bills
      /api/payments:
        post:
          summary: Process payment
          responses:
            '201':
              description: Payment processed
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: icbs-api
  title: ICBS API
  description: Oracle WebLogic platform API
  annotations:
    github.com/project-slug: giovanemere/poc-icbs
spec:
  type: openapi
  lifecycle: production
  owner: infrastructure-team
  system: icbs-system
  definition: |
    openapi: 3.0.0
    info:
      title: ICBS API
      version: 1.0.0
    paths:
      /api/accounts:
        get:
          summary: Get accounts
          responses:
            '200':
              description: List of accounts
