apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: ia-ops-platform
  title: IA-Ops Platform
  description: Plataforma integrada de IA y DevOps con Backstage
  tags:
    - platform
    - ai
    - devops
    - backstage
  annotations:
    github.com/project-slug: tu-organizacion/ia-ops
    backstage.io/techdocs-ref: dir:.
spec:
  owner: devops-team
  domain: platform
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: backstage-portal
  title: Backstage Portal
  description: Portal de desarrolladores basado en Backstage nativo
  tags:
    - frontend
    - portal
    - react
    - backstage
  annotations:
    github.com/project-slug: tu-organizacion/ia-ops
    backstage.io/techdocs-ref: dir:./docs
spec:
  type: website
  lifecycle: production
  owner: devops-team
  system: ia-ops-platform
  providesApis:
    - backstage-api
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: openai-service
  title: OpenAI Service
  description: Servicio nativo de IA compatible con OpenAI API
  tags:
    - backend
    - ai
    - api
    - fastapi
  annotations:
    github.com/project-slug: tu-organizacion/ia-ops
    backstage.io/techdocs-ref: dir:../openai-service
spec:
  type: service
  lifecycle: production
  owner: devops-team
  system: ia-ops-platform
  providesApis:
    - openai-api
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: proxy-service
  title: Proxy Service
  description: Gateway y proxy para comunicación entre servicios
  tags:
    - backend
    - proxy
    - gateway
    - nodejs
  annotations:
    github.com/project-slug: tu-organizacion/ia-ops
    backstage.io/techdocs-ref: dir:../proxy-service
spec:
  type: service
  lifecycle: production
  owner: devops-team
  system: ia-ops-platform
  dependsOn:
    - component:backstage-portal
    - component:openai-service
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: backstage-api
  title: Backstage API
  description: API del portal Backstage nativo
  tags:
    - api
    - rest
    - backstage
spec:
  type: openapi
  lifecycle: production
  owner: devops-team
  system: ia-ops-platform
  definition: |
    openapi: 3.0.0
    info:
      title: Backstage API
      version: 1.0.0
      description: API nativa de Backstage para IA-Ops Platform
    paths:
      /api/catalog/entities:
        get:
          summary: Get catalog entities
          responses:
            '200':
              description: List of entities
      /health:
        get:
          summary: Health check
          responses:
            '200':
              description: Service health status
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: openai-api
  title: OpenAI API
  description: API compatible con OpenAI para servicios de IA
  tags:
    - api
    - ai
    - rest
spec:
  type: openapi
  lifecycle: production
  owner: devops-team
  system: ia-ops-platform
  definition: |
    openapi: 3.0.0
    info:
      title: OpenAI Compatible API
      version: 1.0.8
      description: API compatible con OpenAI para IA-Ops Platform
    paths:
      /chat/completions:
        post:
          summary: Create chat completion
          responses:
            '200':
              description: Chat completion response
      /health:
        get:
          summary: Health check
          responses:
            '200':
              description: Service health status
