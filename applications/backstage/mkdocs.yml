site_name: IA-Ops Backstage Documentation
site_description: Documentación automática del portal de desarrolladores IA-Ops
site_author: IA-Ops Team
site_url: http://localhost:8080
repo_name: giovanemere/ia-ops
repo_url: https://github.com/giovanemere/ia-ops
edit_uri: edit/main/applications/backstage/docs/
theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.annotate
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - toc:
      permalink: true
nav:
  - Home: index.md
  - Setup: setup.md
  - Configuration: configuration.md
  - Components:
      - Backstage Portal: components/backstage.md
      - OpenAI Service: components/openai.md
      - Proxy Service: components/proxy.md
  - APIs:
      - Backstage API: apis/backstage-api.md
      - OpenAI API: apis/openai-api.md
  - CI/CD:
      - GitHub Actions: cicd/github-actions.md
      - Deployment: cicd/deployment.md
  - Monitoring:
      - Metrics: monitoring/metrics.md
      - Logs: monitoring/logs.md
plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
  - minify:
      minify_html: true
  - techdocs-core
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/giovanemere/ia-ops
  version:
    provider: mike
