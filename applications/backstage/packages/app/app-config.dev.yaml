app:
  title: IA-Ops Platform (Dev)
  baseUrl: http://localhost:3000

organization:
  name: IA-Ops Organization

backend:
  auth:
    keys:
      - secret: ${BACKEND_SECRET}
  baseUrl: http://localhost:7007
  listen:
    port: 7007
    host: 0.0.0.0
  cors:
    origin: 
      - http://localhost:3000
      - http://localhost:7007
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  
  database:
    client: pg
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
      database: ${POSTGRES_DB}
      ssl: false

integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}

proxy:
  endpoints:
    '/openai':
      target: ${OPENAI_SERVICE_URL:-http://openai-service:8000}
      changeOrigin: true
      headers:
        Authorization: Bearer ${OPENAI_API_KEY}

techdocs:
  builder: 'local'
  generator:
    runIn: 'local'
  publisher:
    type: 'local'

auth:
  environment: development
  session:
    secret: ${BACKEND_SECRET}
  providers:
    # Disable GitHub auth temporarily
    guest:
      dangerouslyAllowOutsideDevelopment: true

scaffolder:
  defaultAuthor:
    name: IA-Ops Platform
    email: devops@ia-ops.local
  defaultCommitMessage: 'Initial commit from Backstage Scaffolder'

catalog:
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration
  rules:
    - allow: [Component, System, API, Resource, Location, User, Group, Domain]
  locations:
    - type: file
      target: ../../examples/entities.yaml
    - type: file
      target: ../../examples/template/template.yaml
      rules:
        - allow: [Template]
    - type: file
      target: ../../examples/org.yaml
      rules:
        - allow: [User, Group]
    - type: file
      target: ../../catalog-info.yaml

enabled:
  kubernetes: false
  techdocs: true
  scaffolder: true
  catalog-import: true
  api-docs: true
  search: true
