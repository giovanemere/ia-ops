apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: gcp-cost-tracking
  description: Seguimiento de costos GCP
  tags:
    - cost
    - gcp
    - monitoring
spec:
  type: cost-tracker
  owner: platform-team
  system: ia-ops-platform
links:
  - url: https://console.cloud.google.com/billing
