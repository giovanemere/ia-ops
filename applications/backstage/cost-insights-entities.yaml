apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: azure-cost-tracking
  description: Seguimiento de costos Azure
  tags:
    - cost
    - azure
    - monitoring
spec:
  type: cost-tracker
  owner: platform-team
  system: ia-ops-platform
