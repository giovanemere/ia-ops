version: '3.8'

# =============================================================================
# IA-OPS PLATFORM - DOCKER COMPOSE
# =============================================================================
# Descripción: Configuración completa para desarrollo local
# Servicios: Backstage, OpenAI Service, PostgreSQL, Redis, Monitoring

networks:
  ia-ops-network:
    driver: bridge
    ipam:
      config:
        - subnet: ${SUBNET:-172.20.0.0/16}

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

services:
  # =============================================================================
  # DATABASE SERVICES
  # =============================================================================
  
  postgres:
    image: postgres:${POSTGRES_VERSION:-15}
    container_name: ia-ops-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${DEV_POSTGRES_PORT:-5432}:5432"
    networks:
      - ia-ops-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:${REDIS_VERSION:-7}-alpine
    container_name: ia-ops-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "${DEV_REDIS_PORT:-6379}:6379"
    networks:
      - ia-ops-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # =============================================================================
  # PROXY SERVICE
  # =============================================================================

  proxy-service:
    build:
      context: ./applications/proxy-service
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY}/ia-ops-proxy-service:${PROXY_SERVICE_VERSION}
    container_name: ia-ops-proxy-service
    environment:
      - NODE_ENV=${NODE_ENV}
      - LOG_LEVEL=${LOG_LEVEL}
      - PROXY_SERVICE_PORT=${PROXY_SERVICE_PORT}
      - PROXY_SERVICE_HOST=0.0.0.0
      - PROXY_RATE_LIMIT=${PROXY_RATE_LIMIT}
      - PROXY_TIMEOUT=${PROXY_TIMEOUT}
      - PROXY_CORS_ENABLED=${PROXY_CORS_ENABLED}
      - PROXY_LOGGING_ENABLED=${PROXY_LOGGING_ENABLED}
      - PROXY_BACKSTAGE_FRONTEND_URL=${PROXY_BACKSTAGE_FRONTEND_URL}
      - PROXY_BACKSTAGE_BACKEND_URL=${PROXY_BACKSTAGE_BACKEND_URL}
      - PROXY_OPENAI_SERVICE_URL=${PROXY_OPENAI_SERVICE_URL}
      - BACKSTAGE_BASE_URL=${BACKSTAGE_BASE_URL}
      - BACKSTAGE_FRONTEND_URL=${BACKSTAGE_FRONTEND_URL}
    volumes:
      - ./config/proxy:/app/config:ro
      - ./logs:/app/logs
    ports:
      - "${DEV_PROXY_PORT:-8080}:8080"
    networks:
      - ia-ops-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # =============================================================================
  # APPLICATION SERVICES
  # =============================================================================

  openai-service:
    build:
      context: ./applications/openai-service
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY}/ia-ops-openai-service:${OPENAI_SERVICE_VERSION}
    container_name: ia-ops-openai-service
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - OPENAI_MAX_TOKENS=${OPENAI_MAX_TOKENS}
      - OPENAI_TEMPERATURE=${OPENAI_TEMPERATURE}
      - OPENAI_DEMO_MODE=${OPENAI_DEMO_MODE}
      - LOG_LEVEL=${LOG_LEVEL}
      - DEBUG_MODE=${DEBUG_MODE}
    volumes:
      - ./config/openai:/app/config:ro
      - ./applications/openai-service/knowledge:/app/knowledge:ro
      - ./logs:/app/logs
    ports:
      - "${DEV_OPENAI_PORT:-8000}:8000"
    networks:
      - ia-ops-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # =============================================================================
  # BACKSTAGE SERVICES
  # =============================================================================

  backstage-frontend:
    build:
      context: ./applications/backstage
      dockerfile: Dockerfile.frontend.fixed
    image: ${DOCKER_REGISTRY:-edissonz8809}/ia-ops-backstage-frontend:${BACKSTAGE_VERSION:-1.0.7}
    container_name: ia-ops-backstage-frontend
    environment:
      # Node.js Configuration
      - NODE_ENV=${NODE_ENV:-production}
      - NODE_OPTIONS=--max-old-space-size=2048
      
      # Backstage Frontend Configuration
      - REACT_APP_BACKEND_URL=${BACKSTAGE_INTERNAL_BACKEND_URL:-http://backstage-backend:7007}
      - REACT_APP_PROXY_URL=${PROXY_SERVICE_URL:-http://proxy-service:8080}
      - REACT_APP_BASE_URL=${BACKSTAGE_BASE_URL:-http://localhost:3000}
      - REACT_APP_API_BASE_URL=${BACKSTAGE_API_BASE_URL:-http://localhost:7007/api}
      
      # Feature Flags
      - REACT_APP_ENABLE_TECH_RADAR=${BACKSTAGE_ENABLE_TECH_RADAR:-true}
      - REACT_APP_ENABLE_CATALOG=${BACKSTAGE_ENABLE_CATALOG:-true}
      - REACT_APP_ENABLE_DOCS=${BACKSTAGE_ENABLE_DOCS:-true}
      
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./config/backstage:/app/config:ro
      - ./applications/backstage/catalog:/app/catalog:ro
    ports:
      - "${DEV_BACKSTAGE_FRONTEND_PORT:-3000}:3000"
    networks:
      - ia-ops-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    depends_on:
      backstage-backend:
        condition: service_healthy

  backstage-backend:
    build:
      context: ./applications/backstage
      dockerfile: Dockerfile.backend.fixed
    image: ${DOCKER_REGISTRY:-edissonz8809}/ia-ops-backstage-backend:${BACKSTAGE_VERSION:-1.0.7}
    container_name: ia-ops-backstage-backend
    environment:
      # Node.js Configuration
      - NODE_ENV=${NODE_ENV:-production}
      - NODE_OPTIONS=--max-old-space-size=2048
      - PORT=7007
      
      # Backstage Backend Configuration
      - BACKEND_SECRET=${BACKEND_SECRET:-your-secret-key-here}
      - BASE_URL=${BACKSTAGE_BASE_URL:-http://localhost:3000}
      - BACKEND_BASE_URL=${BACKSTAGE_BACKEND_BASE_URL:-http://localhost:7007}
      
      # Database Configuration
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      
      # Redis Configuration
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      
      # GitHub Integration
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - AUTH_GITHUB_CLIENT_ID=${AUTH_GITHUB_CLIENT_ID}
      - AUTH_GITHUB_CLIENT_SECRET=${AUTH_GITHUB_CLIENT_SECRET}
      
      # OpenAI Integration
      - OPENAI_SERVICE_URL=${OPENAI_SERVICE_URL:-http://openai-service:8000}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      
      # Security Configuration
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000,http://localhost:8080}
      
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - DEBUG_MODE=${DEBUG_MODE:-false}
    volumes:
      - ./config/backstage:/app/config:ro
      - ./applications/backstage/catalog:/app/catalog:ro
      - ./docs:/app/docs:ro
    ports:
      - "${DEV_BACKSTAGE_BACKEND_PORT:-7007}:7007"
    networks:
      - ia-ops-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7007/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # =============================================================================
  # MONITORING SERVICES
  # =============================================================================

  prometheus:
    image: prom/prometheus:latest
    container_name: ia-ops-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    volumes:
      - ./config/monitoring/prometheus-config.yaml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - ia-ops-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: ia-ops-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/monitoring/grafana:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    networks:
      - ia-ops-network
    restart: unless-stopped
    depends_on:
      - prometheus

  # =============================================================================
  # DOCUMENTATION SERVICES
  # =============================================================================

  mkdocs:
    image: squidfunk/mkdocs-material:latest
    container_name: ia-ops-mkdocs
    volumes:
      - ./docs:/docs
      - ./applications/docs/mkdocs.yml:/docs/mkdocs.yml:ro
    ports:
      - "${MKDOCS_PORT:-8080}:8000"
    networks:
      - ia-ops-network
    command: serve --dev-addr=0.0.0.0:8000
    restart: unless-stopped
