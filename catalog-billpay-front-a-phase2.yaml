      /api/payments:
        post:
          summary: Crear nuevo pago
          responses:
            '201':
              description: Pago creado exitosamente
      /api/payments/{id}:
        put:
          summary: Actualizar pago existente
          responses:
            '200':
              description: Pago actualizado exitosamente
