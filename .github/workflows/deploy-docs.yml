name: 📚 Deploy Documentation to GitHub Pages

on:
  push:
    branches: [ trunk ]
    paths: 
      - 'docs/**'
      - 'mkdocs*.yml'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-docs:
    name: 🏗️ Build Documentation
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 📦 Install MkDocs and dependencies
      run: |
        pip install --upgrade pip
        pip install mkdocs mkdocs-material mkdocs-mermaid2-plugin

    - name: 🏗️ Build documentation
      run: |
        if [ -f "mkdocs.ci.yml" ]; then
          echo "📚 Building documentation with CI configuration..."
          mkdocs build --config-file mkdocs.ci.yml --clean
        else
          echo "📚 Building documentation with default configuration..."
          mkdocs build --clean
        fi

    - name: 📤 Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./site

  deploy-docs:
    name: 🚀 Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-docs
    
    steps:
    - name: 🚀 Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

  notify-deployment:
    name: 📢 Notify Deployment
    runs-on: ubuntu-latest
    needs: [build-docs, deploy-docs]
    if: always()
    
    steps:
    - name: 🎉 Deployment success
      if: needs.deploy-docs.result == 'success'
      run: |
        echo "🎉 Documentation deployed successfully!"
        echo "📚 Documentation is available at: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
        
    - name: ❌ Deployment failure
      if: needs.deploy-docs.result == 'failure'
      run: |
        echo "❌ Documentation deployment failed!"
        echo "Please check the logs above for details."
        exit 1
