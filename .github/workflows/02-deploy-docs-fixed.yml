name: 📚 Deploy Documentation (Fixed)

on:
  push:
    branches: [ trunk ]
    paths: 
      - 'docs/**'
      - 'mkdocs*.yml'
      - '.github/workflows/02-deploy-docs-fixed.yml'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force documentation deployment'
        required: false
        default: false
        type: boolean

# Permisos específicos para GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Solo un despliegue concurrente
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ============================================================================
  # STAGE 1: BUILD DOCUMENTATION
  # ============================================================================
  
  build-documentation:
    name: 🏗️ Build Documentation
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🐍 Setup Python environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: 🔧 Install system dependencies
      run: |
        echo "🔧 Installing system dependencies..."
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          libcairo2-dev \
          libfreetype6-dev \
          libffi-dev \
          libjpeg-dev \
          libpng-dev \
          libz-dev
        echo "✅ System dependencies installed"

    - name: 📦 Create requirements file
      run: |
        echo "📦 Creating requirements.txt for documentation..."
        cat > requirements-docs.txt << 'EOF'
        # MkDocs core
        mkdocs>=1.5.0,<2.0.0
        
        # Material theme
        mkdocs-material>=9.4.0,<10.0.0
        
        # Plugins
        mkdocs-mermaid2-plugin>=1.1.0,<2.0.0
        
        # Additional dependencies
        Pygments>=2.16.0
        pymdown-extensions>=10.3.0
        
        # Optional but useful
        pillow>=10.0.0
        cairosvg>=2.7.0
        EOF
        
        echo "✅ Requirements file created"

    - name: 📦 Install documentation dependencies
      run: |
        echo "📦 Installing MkDocs and plugins with fixed versions..."
        
        # Upgrade pip first
        python -m pip install --upgrade pip setuptools wheel
        
        # Install dependencies with retry logic
        for i in {1..3}; do
          echo "Attempt $i to install dependencies..."
          if pip install -r requirements-docs.txt --no-cache-dir; then
            echo "✅ Dependencies installed successfully"
            break
          else
            echo "⚠️ Attempt $i failed, retrying..."
            sleep 5
          fi
          
          if [ $i -eq 3 ]; then
            echo "❌ Failed to install dependencies after 3 attempts"
            exit 1
          fi
        done
        
        # Verify installations
        echo "🔍 Verifying installations..."
        mkdocs --version
        python -c "import mkdocs_material; print(f'Material theme: {mkdocs_material.__version__}')"
        python -c "import mermaid; print('Mermaid plugin: OK')" || echo "Mermaid plugin: Not available (optional)"

    - name: 🔍 Validate documentation structure
      run: |
        echo "🔍 Validating documentation structure..."
        
        # Check for required directories
        if [ ! -d "docs" ]; then
          echo "❌ docs/ directory not found"
          echo "📁 Creating basic docs structure..."
          mkdir -p docs
          echo "# IA-Ops Platform Documentation" > docs/index.md
          echo "Welcome to IA-Ops Platform documentation." >> docs/index.md
        fi
        
        # Check for MkDocs configuration
        config_found=false
        if [ -f "mkdocs.ci.yml" ]; then
          echo "✅ Found mkdocs.ci.yml"
          config_found=true
        elif [ -f "mkdocs.yml" ]; then
          echo "✅ Found mkdocs.yml"
          config_found=true
        fi
        
        if [ "$config_found" = false ]; then
          echo "❌ No MkDocs configuration found"
          echo "📋 Creating basic mkdocs.yml..."
          cat > mkdocs.yml << 'EOF'
        site_name: IA-Ops Platform
        site_description: Plataforma integrada de IA y DevOps con Backstage
        site_author: DevOps Team
        
        theme:
          name: material
          palette:
            - scheme: default
              primary: blue
              accent: blue
              toggle:
                icon: material/brightness-7
                name: Switch to dark mode
            - scheme: slate
              primary: blue
              accent: blue
              toggle:
                icon: material/brightness-4
                name: Switch to light mode
          features:
            - navigation.tabs
            - navigation.sections
            - navigation.expand
            - navigation.top
            - search.highlight
            - search.share
        
        nav:
          - Home: index.md
        
        markdown_extensions:
          - admonition
          - pymdownx.details
          - pymdownx.superfences
          - pymdownx.tabbed:
              alternate_style: true
          - pymdownx.highlight:
              anchor_linenums: true
          - pymdownx.inlinehilite
          - pymdownx.snippets
          - attr_list
          - md_in_html
          - toc:
              permalink: true
        
        plugins:
          - search
        
        strict: false
        EOF
        fi
        
        # Count documentation files
        md_files=$(find docs -name "*.md" | wc -l)
        echo "📄 Found $md_files markdown files"
        
        if [ $md_files -eq 0 ]; then
          echo "⚠️ No markdown files found, creating basic content"
          echo "# IA-Ops Platform Documentation" > docs/index.md
          echo "" >> docs/index.md
          echo "## Welcome" >> docs/index.md
          echo "" >> docs/index.md
          echo "This is the documentation for IA-Ops Platform." >> docs/index.md
          echo "" >> docs/index.md
          echo "## Features" >> docs/index.md
          echo "" >> docs/index.md
          echo "- 🏛️ **Backstage**: Developer portal" >> docs/index.md
          echo "- 🤖 **OpenAI Service**: AI integration" >> docs/index.md
          echo "- 📚 **Documentation**: Smart documentation with MkDocs" >> docs/index.md
          echo "- 🎯 **Templates**: Multi-cloud deployment templates" >> docs/index.md
        fi
        
        echo "✅ Documentation structure validated"

    - name: 🏗️ Build documentation site
      run: |
        echo "🏗️ Building documentation with MkDocs..."
        
        # Use CI config if available, otherwise use default
        if [ -f "mkdocs.ci.yml" ]; then
          echo "📋 Using mkdocs.ci.yml configuration"
          mkdocs build --config-file mkdocs.ci.yml --clean --verbose --strict
        else
          echo "📋 Using mkdocs.yml configuration"
          mkdocs build --clean --verbose --strict
        fi
        
        echo "✅ Documentation built successfully"

    - name: 📊 Documentation build summary
      run: |
        echo "📊 Documentation Build Summary"
        echo "=============================="
        
        if [ -d "site" ]; then
          site_size=$(du -sh site | cut -f1)
          file_count=$(find site -type f | wc -l)
          
          echo "📁 Site directory: $site_size"
          echo "📄 Total files: $file_count"
          echo "🌐 Entry point: site/index.html"
          
          # List main files
          echo ""
          echo "📋 Main files generated:"
          ls -la site/ | head -10
          
          # Check for common files
          if [ -f "site/index.html" ]; then
            echo "✅ index.html found"
          else
            echo "❌ index.html missing"
            exit 1
          fi
          
          if [ -f "site/404.html" ]; then
            echo "✅ 404.html found"
          fi
          
          # Check site content
          if [ -s "site/index.html" ]; then
            echo "✅ index.html has content"
          else
            echo "❌ index.html is empty"
            exit 1
          fi
          
        else
          echo "❌ Site directory not found"
          exit 1
        fi

    - name: 📤 Setup GitHub Pages
      uses: actions/configure-pages@v4

    - name: 📤 Upload documentation artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './site'

  # ============================================================================
  # STAGE 2: DEPLOY TO GITHUB PAGES
  # ============================================================================
  
  deploy-to-pages:
    name: 🚀 Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-documentation
    
    steps:
    - name: 🚀 Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

    - name: 🎉 Deployment success notification
      run: |
        echo "🎉 Documentation deployed successfully!"
        echo "======================================"
        echo ""
        echo "🌐 Documentation URL: ${{ steps.deployment.outputs.page_url }}"
        echo "📅 Deployed at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
        echo "📝 Commit: ${{ github.sha }}"
        echo "🌿 Branch: ${{ github.ref_name }}"
        echo ""
        echo "🔗 Quick Links:"
        echo "- 📚 Documentation: ${{ steps.deployment.outputs.page_url }}"
        echo "- 📊 Repository: https://github.com/${{ github.repository }}"
        echo "- ⚙️ Pages Settings: https://github.com/${{ github.repository }}/settings/pages"
        echo ""
        echo "✨ Documentation is now live and accessible!"

  # ============================================================================
  # STAGE 3: POST-DEPLOYMENT VERIFICATION
  # ============================================================================
  
  verify-deployment:
    name: ✅ Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy-to-pages
    
    steps:
    - name: 🔍 Verify site accessibility
      run: |
        echo "🔍 Verifying documentation deployment..."
        
        # Wait a moment for deployment to propagate
        sleep 30
        
        # Get the deployment URL
        SITE_URL="${{ needs.deploy-to-pages.outputs.page_url }}"
        
        if [ -z "$SITE_URL" ]; then
          SITE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
        fi
        
        echo "🌐 Testing URL: $SITE_URL"
        
        # Test site accessibility with retry
        for i in {1..5}; do
          echo "Attempt $i to verify site..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SITE_URL" || echo "000")
          
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Site is accessible (HTTP $HTTP_STATUS)"
            break
          elif [ "$HTTP_STATUS" = "404" ]; then
            echo "⚠️ Site returned 404 - may still be propagating (attempt $i/5)"
            if [ $i -lt 5 ]; then
              sleep 30
            fi
          else
            echo "⚠️ Site returned HTTP $HTTP_STATUS (attempt $i/5)"
            if [ $i -lt 5 ]; then
              sleep 30
            fi
          fi
          
          if [ $i -eq 5 ]; then
            echo "🔍 Final status: HTTP $HTTP_STATUS"
            echo "🕐 If status is not 200, please wait a few minutes for DNS propagation"
          fi
        done
        
        echo ""
        echo "📋 Deployment Summary:"
        echo "- URL: $SITE_URL"
        echo "- Final Status: HTTP $HTTP_STATUS"
        echo "- Time: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

    - name: 📢 Final deployment summary
      run: |
        echo "📢 Documentation Deployment Complete!"
        echo "===================================="
        echo ""
        echo "🎯 What was deployed:"
        echo "- IA-Ops Platform Documentation"
        echo "- Built with MkDocs + Material theme"
        echo "- Includes all markdown files from docs/"
        echo "- Robust build process with error handling"
        echo ""
        echo "🔄 Auto-update triggers:"
        echo "- Pushes to trunk branch"
        echo "- Changes in docs/ directory"
        echo "- Changes in mkdocs*.yml files"
        echo "- Manual workflow dispatch"
        echo ""
        echo "🛠️ Troubleshooting:"
        echo "- If site shows 404: Wait 5-10 minutes for DNS propagation"
        echo "- Check GitHub Pages settings if issues persist"
        echo "- Verify GitHub Pages is enabled with 'GitHub Actions' source"
        echo "- All dependencies are pinned to stable versions"
        echo ""
        echo "✨ Documentation is ready for use!"
