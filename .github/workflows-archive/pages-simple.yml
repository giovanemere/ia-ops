name: 📚 Deploy Docs to GitHub Pages (Simple)

on:
  push:
    branches: [ trunk ]
    paths: 
      - 'docs/**'
      - 'mkdocs*.yml'
      - '.github/workflows/pages-simple.yml'
  workflow_dispatch:

# Permissions for GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: 🚀 Build and Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 📦 Install dependencies
      run: |
        pip install --upgrade pip
        pip install mkdocs mkdocs-material mkdocs-mermaid2-plugin

    - name: 🏗️ Build docs
      run: |
        echo "📚 Building documentation..."
        if [ -f "mkdocs.ci.yml" ]; then
          mkdocs build --config-file mkdocs.ci.yml --clean --verbose
        else
          mkdocs build --clean --verbose
        fi
        
        echo "📁 Site contents:"
        ls -la site/

    - name: 📤 Setup Pages
      uses: actions/configure-pages@v4

    - name: 📤 Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './site'

    - name: 🚀 Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

    - name: 🎉 Success notification
      run: |
        echo "🎉 Documentation deployed successfully!"
        echo "📚 Available at: ${{ steps.deployment.outputs.page_url }}"
