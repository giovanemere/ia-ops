# Configuración alternativa para Nginx Proxy
# Usar este archivo si se quiere habilitar nginx-proxy en lugar de proxy-service
# Comando: docker-compose -f docker-compose.yml -f docker-compose.nginx-alternative.yml up -d

version: '3.8'

services:
  # Nginx Proxy alternativo (puerto 8081)
  nginx-proxy-alt:
    image: nginx:alpine
    container_name: ia-ops-nginx-proxy-alt
    restart: unless-stopped
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8081:80"  # Puerto diferente para evitar conflictos
    networks:
      - ia-ops-network
    depends_on:
      - backstage-frontend
      - backstage-backend
      - grafana
      - prometheus
      - mkdocs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  ia-ops-network:
    external: true
