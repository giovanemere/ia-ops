# =============================================================================
# DOCKER COMPOSE SIMPLIFICADO - IA-OPS PLATFORM
# =============================================================================
# Usa las variables existentes de .env sin complicaciones

version: '3.8'

networks:
  ia-ops-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:
  # =============================================================================
  # BASE DE DATOS (SIN CAMBIOS)
  # =============================================================================
  postgres:
    image: postgres:15
    container_name: ia-ops-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - ia-ops-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ia-ops-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - ia-ops-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # =============================================================================
  # OPENAI SERVICE (SIN CAMBIOS - YA FUNCIONA)
  # =============================================================================
  openai-service:
    image: ${DOCKER_REGISTRY}/ia-ops-openai-service:${OPENAI_SERVICE_VERSION}
    container_name: ia-ops-openai-service
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - LOG_LEVEL=${LOG_LEVEL}
    ports:
      - "8000:8000"
    networks:
      - ia-ops-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # =============================================================================
  # BACKSTAGE SIMPLIFICADO (SIN COMPILACIÓN COMPLEJA)
  # =============================================================================
  backstage:
    image: spotify/backstage:latest
    container_name: ia-ops-backstage
    environment:
      # Usar variables existentes directamente
      - NODE_ENV=${NODE_ENV}
      - LOG_LEVEL=${LOG_LEVEL}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_SERVICE_URL=http://openai-service:8000
    volumes:
      # Solo archivos de configuración, sin código fuente
      - ./applications/backstage/app-config.yaml:/app/app-config.yaml:ro
      - ./applications/backstage/catalog:/app/catalog:ro
    ports:
      - "7007:7007"
    networks:
      - ia-ops-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7007/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # =============================================================================
  # PROXY SERVICE (SIN CAMBIOS - YA FUNCIONA)
  # =============================================================================
  proxy-service:
    image: ${DOCKER_REGISTRY}/ia-ops-proxy-service:${PROXY_SERVICE_VERSION}
    container_name: ia-ops-proxy-service
    environment:
      - NODE_ENV=${NODE_ENV}
      - LOG_LEVEL=${LOG_LEVEL}
      - PROXY_SERVICE_PORT=8080
      - PROXY_RATE_LIMIT=${PROXY_RATE_LIMIT}
      - PROXY_TIMEOUT=${PROXY_TIMEOUT}
      - BACKSTAGE_FRONTEND_URL=http://backstage:7007
      - BACKSTAGE_BACKEND_URL=http://backstage:7007
      - OPENAI_SERVICE_URL=http://openai-service:8000
    ports:
      - "8080:8080"
    networks:
      - ia-ops-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      backstage:
        condition: service_healthy
      openai-service:
        condition: service_healthy

  # =============================================================================
  # MONITOREO OPCIONAL (SIMPLE)
  # =============================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: ia-ops-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    ports:
      - "3001:3000"
    networks:
      - ia-ops-network
