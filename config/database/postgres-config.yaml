postgres:
  host: ${POSTGRES_HOST}
  port: ${POSTGRES_PORT}
  database: ${POSTGRES_DB}
  username: ${POSTGRES_USER}
  password: ${POSTGRES_PASSWORD}
  
connection_pool:
  min_connections: 5
  max_connections: 20
  idle_timeout: 300
  
ssl:
  enabled: ${SSL_ENABLED}
  mode: prefer
  
backup:
  enabled: true
  schedule: "0 2 * * *"  # Daily at 2 AM
  retention_days: 7
  location: ${BACKUP_DIR}/postgres
  
monitoring:
  slow_query_log: true
  slow_query_threshold: 1000  # milliseconds
  
extensions:
  - uuid-ossp
  - pg_stat_statements
