global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'backstage-backend'
    static_configs:
      - targets: ['backstage-backend:7007']
    metrics_path: '/api/metrics'

  - job_name: 'nginx-proxy'
    static_configs:
      - targets: ['nginx-proxy:80']
    metrics_path: '/metrics'
