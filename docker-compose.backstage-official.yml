version: '3.8'

services:
  backstage:
    image: spotify/backstage:latest
    container_name: backstage
    ports:
      - "7007:7007"
    environment:
      - NODE_ENV=development
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres123
      - POSTGRES_DB=backstage
    volumes:
      - ./config/backstage/app-config.yaml:/app/app-config.yaml:ro
      - ./config/backstage/app-config.local.yaml:/app/app-config.local.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ia-ops-network

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres123
      - POSTGRES_DB=backstage
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ia-ops-network

volumes:
  postgres_data:

networks:
  ia-ops-network:
    driver: bridge
