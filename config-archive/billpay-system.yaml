---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: billpay-api-v1
  title: BillPay API v1
  description: API principal del sistema BillPay
  tags:
    - rest
    - openapi
spec:
  type: openapi
  lifecycle: production
  owner: team:payments
  system: billpay
  definition: |
    openapi: 3.0.0
    info:
      title: BillPay API
      version: 1.0.0
      description: API para gestión y pago de facturas
    paths:
      /bills:
        get:
          summary: Obtener lista de facturas
          responses:
            '200':
              description: Lista de facturas
      /bills/{id}/pay:
        post:
          summary: Procesar pago de factura
          parameters:
            - name: id
              in: path
              required: true
              schema:
                type: string
          responses:
            '200':
              description: Pago procesado exitosamente

