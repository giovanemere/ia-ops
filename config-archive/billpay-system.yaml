    - api
    - gateway
    - payments
  links:
    - url: https://api.billpay.tu-organizacion.com
      title: API Gateway
      icon: api
    - url: https://swagger.billpay.tu-organizacion.com
      title: API Documentation
      icon: docs
spec:
  type: service
  lifecycle: production
  owner: team:payments
  system: billpay
  providesApis:
    - billpay-api-v1
  consumesApis:
    - payment-processor-api
    - notification-service-api
  dependsOn:
    - component:billpay-database
    - component:redis-cache

