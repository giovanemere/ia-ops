  - url: https://github.com/giovanemere/templates_backstage/tree/trunk/gcp-storage
    title: Template Source
    icon: github
  - url: https://cloud.google.com/storage/docs
    title: GCP Storage Documentation
    icon: docs
  - url: https://cloud.google.com/storage
    title: Google Cloud Storage
    icon: cloud

---
