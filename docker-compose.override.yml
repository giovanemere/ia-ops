version: '3.8'

# =============================================================================
# OVERRIDE SIMPLE - USA TUS VARIABLES .ENV EXACTAS
# =============================================================================

services:
  backstage-backend:
    image: spotify/backstage:latest
    environment:
      - NODE_ENV=${NODE_ENV}
      - LOG_LEVEL=${LOG_LEVEL}
      - BACKEND_SECRET=${BACKEND_SECRET}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./applications/backstage/app-config.yaml:/app/app-config.yaml:ro

  backstage-frontend:
    image: nginx:alpine
    volumes:
      - ./applications/backstage/packages/app/dist:/usr/share/nginx/html:ro
      - ./config/nginx-simple.conf:/etc/nginx/conf.d/default.conf:ro
