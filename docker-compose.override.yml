version: '3.8'

services:
  # Disable the complex Backstage services temporarily
  backstage-backend:
    profiles:
      - disabled
  
  backstage-frontend:
    profiles:
      - disabled
  
  # Simplified proxy service that doesn't depend on Backstage
  proxy-service:
    environment:
      # Point to external Backstage running on host
      BACKSTAGE_FRONTEND_URL: http://host.docker.internal:3000
      BACKSTAGE_BACKEND_URL: http://host.docker.internal:7007
    extra_hosts:
      - "host.docker.internal:host-gateway"
