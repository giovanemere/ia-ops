apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: ia-ops-platform
  title: IA-Ops Platform
  description: Plataforma integrada de IA y DevOps con Backstage
  tags:
    - ai
    - devops
    - platform
    - backstage
  annotations:
    backstage.io/source-location: url:https://github.com/tu-organizacion/ia-ops
spec:
  owner: devops-team
  domain: platform
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: backstage-portal
  title: Backstage Portal
  description: Portal de desarrolladores basado en Backstage
  tags:
    - frontend
    - portal
    - backstage
  annotations:
    backstage.io/source-location: url:https://github.com/tu-organizacion/ia-ops/tree/main/applications/backstage
spec:
  type: website
  lifecycle: production
  owner: devops-team
  system: ia-ops-platform
  providesApis:
    - backstage-api
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: openai-service
  title: OpenAI Service
  description: Servicio nativo de IA integrado con OpenAI
  tags:
    - ai
    - api
    - openai
    - fastapi
  annotations:
    backstage.io/source-location: url:https://github.com/tu-organizacion/ia-ops/tree/main/applications/openai-service
spec:
  type: service
  lifecycle: production
  owner: ai-team
  system: ia-ops-platform
  providesApis:
    - openai-api
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: proxy-service
  title: Proxy Gateway
  description: Gateway y proxy para todos los servicios de la plataforma
  tags:
    - gateway
    - proxy
    - nginx
  annotations:
    backstage.io/source-location: url:https://github.com/tu-organizacion/ia-ops/tree/main/applications/proxy-service
spec:
  type: service
  lifecycle: production
  owner: devops-team
  system: ia-ops-platform
  dependsOn:
    - component:backstage-portal
    - component:openai-service
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: monitoring-stack
  title: Monitoring Stack
  description: Stack de monitoreo con Prometheus y Grafana
  tags:
    - monitoring
    - prometheus
    - grafana
  annotations:
    backstage.io/source-location: url:https://github.com/tu-organizacion/ia-ops/tree/main/applications/monitoring
spec:
  type: service
  lifecycle: production
  owner: devops-team
  system: ia-ops-platform
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: backstage-api
  title: Backstage API
  description: API del portal Backstage
  tags:
    - api
    - backstage
spec:
  type: openapi
  lifecycle: production
  owner: devops-team
  system: ia-ops-platform
  definition: |
    openapi: 3.0.0
    info:
      title: Backstage API
      version: 1.0.0
    paths:
      /api/catalog/entities:
        get:
          summary: Get catalog entities
          responses:
            '200':
              description: List of entities
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: openai-api
  title: OpenAI Service API
  description: API del servicio de IA
  tags:
    - api
    - ai
    - openai
spec:
  type: openapi
  lifecycle: production
  owner: ai-team
  system: ia-ops-platform
  definition: |
    openapi: 3.0.0
    info:
      title: OpenAI Service API
      version: 1.0.0
    paths:
      /chat/completions:
        post:
          summary: Chat completions
          responses:
            '200':
              description: AI response
---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: devops-team
  title: DevOps Team
  description: Equipo de DevOps responsable de la plataforma
spec:
  type: team
  children: []
---
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: ai-team
  title: AI Team
  description: Equipo de IA responsable de los servicios de inteligencia artificial
spec:
  type: team
  children: []
---
apiVersion: backstage.io/v1alpha1
kind: User
metadata:
  name: admin
  title: Platform Administrator
  description: Administrador de la plataforma IA-Ops
spec:
  memberOf:
    - devops-team
