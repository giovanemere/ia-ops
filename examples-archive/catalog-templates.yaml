# Ejemplo para templates_backstage/catalog-info.yaml
apiVersion: backstage.io/v1alpha1
kind: Location
metadata:
  name: templates-backstage
  description: Templates de Backstage para IA-Ops Platform
spec:
  targets:
    - ./templates/*/template.yaml
---
# Si tienes templates específicos, puedes definirlos así:
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: react-app-template
  title: React Application Template
  description: Template para crear aplicaciones React
  tags:
    - react
    - frontend
    - javascript
spec:
  owner: platform-team
  type: website
  parameters:
    - title: Información básica
      required:
        - name
        - description
      properties:
        name:
          title: Nombre
          type: string
          description: Nombre único del componente
        description:
          title: Descripción
          type: string
          description: Descripción del componente
        owner:
          title: Owner
          type: string
          description: Owner del componente
          ui:field: OwnerPicker
          ui:options:
            allowedKinds:
              - Group
  steps:
    - id: template
      name: Fetch Skeleton + Template
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
    
    - id: publish
      name: Publish
      action: publish:github
      input:
        allowedHosts: ['github.com']
        description: This is ${{ parameters.name }}
        repoUrl: github.com?owner=giovanemere&repo=${{ parameters.name }}
    
    - id: register
      name: Register
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'
  
  output:
    links:
      - title: Repository
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
