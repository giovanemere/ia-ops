version: '3.8'

# =============================================================================
# BACKSTAGE ONLY - DOCKER COMPOSE
# =============================================================================
# Descripción: Solo servicios de Backstage para debugging rápido

networks:
  ia-ops-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

services:
  # =============================================================================
  # DATABASE SERVICES
  # =============================================================================
  
  postgres:
    image: postgres:15
    container_name: ia-ops-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - ia-ops-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ia-ops-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - ia-ops-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # =============================================================================
  # BACKSTAGE SERVICES
  # =============================================================================

  backstage-backend:
    build:
      context: ./applications/backstage
      dockerfile: Dockerfile.backend.fixed
    image: ia-ops-backstage-backend:latest
    container_name: ia-ops-backstage-backend
    environment:
      # Node.js Configuration
      - NODE_ENV=development
      - NODE_OPTIONS=--max-old-space-size=2048
      - PORT=7007
      
      # Backstage Backend Configuration
      - BACKEND_SECRET=${BACKEND_SECRET}
      - BASE_URL=http://localhost:3000
      - BACKEND_BASE_URL=http://localhost:7007
      
      # Database Configuration
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      
      # Redis Configuration
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=0
      
      # GitHub Integration
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - AUTH_GITHUB_CLIENT_ID=${AUTH_GITHUB_CLIENT_ID}
      - AUTH_GITHUB_CLIENT_SECRET=${AUTH_GITHUB_CLIENT_SECRET}
      
      # OpenAI Integration
      - OPENAI_SERVICE_URL=http://localhost:8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
      
      # Security Configuration
      - CORS_ORIGIN=http://localhost:3000,http://localhost:8080
      
      # Logging
      - LOG_LEVEL=info
      - DEBUG_MODE=true
    volumes:
      - ./config/backstage:/app/config:ro
      - ./applications/backstage/catalog:/app/catalog:ro
      - ./docs:/app/docs:ro
    ports:
      - "7007:7007"
    networks:
      - ia-ops-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7007/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  backstage-frontend:
    build:
      context: ./applications/backstage
      dockerfile: Dockerfile.frontend.fixed
    image: ia-ops-backstage-frontend:latest
    container_name: ia-ops-backstage-frontend
    environment:
      # Node.js Configuration
      - NODE_ENV=development
      - NODE_OPTIONS=--max-old-space-size=2048
      
      # Backstage Frontend Configuration
      - REACT_APP_BACKEND_URL=http://localhost:7007
      - REACT_APP_BASE_URL=http://localhost:3000
      - REACT_APP_API_BASE_URL=http://localhost:7007/api
      
      # Feature Flags
      - REACT_APP_ENABLE_TECH_RADAR=true
      - REACT_APP_ENABLE_CATALOG=true
      - REACT_APP_ENABLE_DOCS=true
      
      # Logging
      - LOG_LEVEL=info
    volumes:
      - ./config/backstage:/app/config:ro
      - ./applications/backstage/catalog:/app/catalog:ro
    ports:
      - "3000:3000"
    networks:
      - ia-ops-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    depends_on:
      backstage-backend:
        condition: service_healthy
